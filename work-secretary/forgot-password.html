<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘記密碼 - 工作小秘書</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-grid"></div>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-hdr">
            <div class="icon">🔐</div>
            <h1 class="gradient">忘記密碼</h1>
            <p class="auth-sub">輸入您註冊的 Email，我們將寄送密碼重設連結</p>
        </div>
        <div id="alertBox"></div>
        <form id="forgotForm" class="auth-form" onsubmit="return sendReset(event)">
            <div class="form-group">
                <label>電子郵件</label>
                <input type="email" id="email" required placeholder="jiunwie.hu@gmail.com">
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="sendBtn">📧 寄送重設連結</button>
        </form>
        <div class="auth-ftr"><a href="index.html">← 返回登入</a></div>
    </div>
</div>
<div id="toastContainer"></div>
<script src="api.js"></script>
<script>
function showAlert(m,t){document.getElementById('alertBox').innerHTML=`<div class="alert alert-${t}">${m}</div>`}

async function sendReset(e) {
    e.preventDefault();
    const btn = document.getElementById('sendBtn');
    btn.disabled = true; btn.textContent = '⏳ 傳送中...';
    try {
        await ApiClient.forgotPassword(document.getElementById('email').value);
        document.getElementById('alertBox').innerHTML = '<div class="alert alert-success">✅ 如果此 Email 已註冊，您將收到密碼重設信件</div>';
        btn.textContent = '📧 已送出';
    } catch(e) {
        showAlert('❌ '+e.message, 'error');
        btn.disabled = false; btn.textContent = '📧 寄送重設連結';
    }
    return false;
}
</script>
</body>
</html>
