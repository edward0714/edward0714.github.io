<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼 - 愛德華AI私人助理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-grid"></div>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-hdr">
            <div class="icon">🔑</div>
            <h1 class="gradient">重設密碼</h1>
            <p class="auth-sub">請輸入您的新密碼</p>
        </div>
        <div id="alertBox"></div>
        <form id="resetForm" class="auth-form" onsubmit="return resetPw(event)">
            <input type="hidden" id="token">
            <div class="form-group">
                <label>新密碼</label>
                <input type="password" id="password" required minlength="8" placeholder="至少 8 個字元">
            </div>
            <div class="form-group">
                <label>確認新密碼</label>
                <input type="password" id="confirm" required minlength="8" placeholder="再次輸入">
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="resetBtn">🔑 重設密碼</button>
        </form>
        <div class="auth-ftr"><a href="index.html">← 返回登入</a></div>
    </div>
</div>
<div id="toastContainer"></div>
<script src="api.js"></script>
<script>
function showAlert(m,t){document.getElementById('alertBox').innerHTML=`<div class="alert alert-${t}">${m}</div>`}

async function resetPw(e) {
    e.preventDefault();
    const pw = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    if (pw !== confirm) { showAlert('❌ 兩次密碼不一致','error'); return false; }

    const btn = document.getElementById('resetBtn');
    btn.disabled = true; btn.textContent = '⏳ 處理中...';
    try {
        const token = document.getElementById('token').value;
        await ApiClient.resetPassword(token, pw, confirm);
        document.getElementById('alertBox').innerHTML = '<div class="alert alert-success">✅ 密碼已重設成功！即將跳轉登入頁...</div>';
        setTimeout(() => location.href = 'index.html', 2000);
    } catch(e) {
        showAlert('❌ '+e.message, 'error');
        btn.disabled = false; btn.textContent = '🔑 重設密碼';
    }
    return false;
}

// Get token from URL
const params = new URLSearchParams(location.search);
const token = params.get('token');
if (token) {
    document.getElementById('token').value = token;
} else {
    showAlert('❌ 連結已失效或缺少驗證碼', 'error');
}
</script>
</body>
</html>
