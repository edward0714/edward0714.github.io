    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

        /* Dashboard-specific overrides (keeps style.css clean) */
        .dash-card { height: 100%; display: flex; flex-direction: column; }
        .dash-card .card-body { flex: 1; }
        .minilist { display: flex; flex-direction: column; gap: 10px; }
        .mini-item {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            border-radius: var(--rad-sm); background: rgba(255,255,255,.02);
            transition: background .2s; text-decoration: none; color: var(--text);
        }
        .mini-item:hover { background: rgba(255,255,255,.05); }
        .mini-icon { font-size: 1.3rem; flex-shrink: 0; width: 28px; text-align: center; }
        .mini-body { flex: 1; min-width: 0; }
        .mini-body .ttl { font-weight: 500; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-body .sub { font-size: .78rem; color: var(--text3); margin-top: 2px; }
        .mini-badge {
            font-size: .72rem; padding: 2px 8px; border-radius: 4px;
            background: rgba(59,130,246,.15); color: var(--blue); flex-shrink: 0;
        }
        .mini-prio-low { background: rgba(34,197,94,.15); color: #86efac; }
        .mini-prio-medium { background: rgba(245,158,11,.15); color: #fde68a; }
        .mini-prio-high { background: rgba(239,68,68,.15); color: #fca5a5; }
        .greeting-date { font-size: .85rem; color: var(--text3); margin-top: 4px; }
    </style>
</head>

            </div>
            <div class="card-body" id="taskSection">

                    <a href="reports.html?action=new" class="qaction">
                        <span class="icon">📄</span>
                        <div>

                        </div>
                    </a>
                    <a href="profile.html" class="qaction">
                        <span class="icon">👤</span>
                        <div>
                            <div class="ttl">個人設定</div>
                            <div class="dsc">修改個人資料與密碼</div>
                        </div>
                    </a>
                    <a href="reports.html" class="qaction">
                        <span class="icon">📊</span>
                        <div>
                            <div class="ttl">檢視報告</div>

</div><!-- /.container -->

<!-- Toast Container -->
<div id="toastContainer"></div>

<!-- ════════════════════ Scripts ════════════════════ -->
<script src="api.js"></script>
<script>
/* ─── Toast helper ─── */
function showToast(msg, type) {
    const container = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + (type === 'success' ? 'toast-s' : 'toast-e');
    t.textContent = msg;
    container.appendChild(t);
    setTimeout(() => t.remove(), 3500);
}

/* ─── Mobile menu toggle ─── */
function toggleMobileMenu() {
    document.getElementById('mobileMenu').classList.toggle('open');
}

/* ─── Date formatting (Chinese locale) ─── */
function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString('zh-TW', {
        year: 'numeric', month: 'long', day: 'numeric',
        weekday: 'short'
    }).replace(/星期/g, '週');
}

function formatDateTime(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString('zh-TW', {
        year: 'numeric', month: 'long', day: 'numeric',
        weekday: 'short', hour: '2-digit', minute: '2-digit'
    }).replace(/星期/g, '週');
}

function formatTime(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
}

function formatShortDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    const today = new Date();
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);

    const ds = d.toDateString();
    if (ds === today.toDateString()) return '今天';
    if (ds === tomorrow.toDateString()) return '明天';
    if (ds === yesterday.toDateString()) return '昨天';

    return d.toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric', weekday: 'short' }).replace(/星期/g, '週');
}

/* ─── Calendar time formatting ─── */
function parseCalIso(isoStr) {
    if (!isoStr) return { isAllDay: true, date: '', time: '', dateObj: null };
    // All-day events: "2026-06-26" (no time component)
    if (/^\d{4}-\d{2}-\d{2}$/.test(isoStr)) {
        const d = new Date(isoStr + 'T00:00:00');
        return { isAllDay: true, date: isoStr, time: '', dateObj: d };
    }
    const d = new Date(isoStr);
    if (isNaN(d.getTime())) return { isAllDay: true, date: isoStr, time: '', dateObj: null };
    const dateStr = d.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit', weekday: 'short' }).replace(/星期/g, '週');
    const timeStr = d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
    return { isAllDay: false, date: dateStr, time: timeStr, dateObj: d, iso: isoStr };
}

function formatCalTime(startIso, endIso) {
    const s = parseCalIso(startIso);
    const e = parseCalIso(endIso);
    if (s.isAllDay && e.isAllDay) {
        if (s.date === e.date) {
            return '📅 ' + (formatShortDate(startIso) || s.date);
        }
        return '📅 ' + (formatShortDate(startIso) || s.date) + ' → ' + (formatShortDate(endIso) || e.date);
    }
    // Timed event
    if (s.date === e.date) {
        return '🕐 ' + s.date + ' ' + s.time + ' — ' + e.time;
    }
    return '🕐 ' + s.date + ' ' + s.time + ' → ' + e.date + ' ' + e.time;
}

/* ─── Event detail modal ─── */
function showEventDetail(idx) {
    const events = window._calEvents || [];
    const ev = events[idx];
    if (!ev) return;

    const s = parseCalIso(ev.start);
    const e = parseCalIso(ev.end);

    // Build time display
    let timeHtml;
    if (s.isAllDay && e.isAllDay) {
        if (s.date === e.date) {
            const d = formatShortDate(ev.start);
            timeHtml = d + '（全天）';
        } else {
            timeHtml = formatShortDate(ev.start) + ' → ' + formatShortDate(ev.end) + '（全天）';
        }
    } else if (s.date === e.date) {
        timeHtml = s.date + '<br>⏰ ' + s.time + ' — ' + e.time;
    } else {
        timeHtml = s.date + ' ' + s.time + '<br>→ ' + e.date + ' ' + e.time;
    }

    document.getElementById('modalEventTitle').textContent = ev.summary || '無標題';
    document.getElementById('modalEventTime').innerHTML = '⏰ ' + timeHtml;
    const locEl = document.getElementById('modalEventLocation');
    if (ev.location) {
        locEl.innerHTML = '📍 ' + escapeHtml(ev.location);
        locEl.style.display = 'flex';
    } else {
        locEl.style.display = 'none';
    }
    const descEl = document.getElementById('modalEventDesc');
    if (ev.description) {
        descEl.innerHTML = escapeHtml(ev.description).replace(/\n/g, '<br>');
        descEl.style.display = 'block';
    } else {
        descEl.style.display = 'none';
    }
    if (ev.htmlLink) {
        document.getElementById('modalEventLink').href = ev.htmlLink;
        document.getElementById('modalEventLink').style.display = 'inline-flex';
    } else {
        document.getElementById('modalEventLink').style.display = 'none';
    }

    document.getElementById('eventDetailModal').classList.add('open');
}

function closeEventModal() {
    document.getElementById('eventDetailModal').classList.remove('open');
}

// Close modal on overlay click
document.addEventListener('click', function (e) {
    const modal = document.getElementById('eventDetailModal');
    if (e.target === modal) closeEventModal();
});
function priorityLabel(p) {
    const map = { 'low': '低', 'medium': '中', 'high': '高', 'urgent': '緊急' };
    return map[p] || p || '';
}

function priorityClass(p) {
    return 'mini-prio-' + (p || 'low');
}

/* ─── Load Dashboard ─── */
async function loadDashboard() {
    // 1. Check auth
    const user = await requireAuth();
    if (!user) return;

    const displayName = user.display_name || user.username || '使用者';
    document.getElementById('greeting').textContent = '👋 歡迎回來，' + displayName;
    document.getElementById('navUserName').textContent = displayName;
    document.getElementById('mobileUserName').textContent = '👤 ' + displayName;

    // 2. Today's date
    const now = new Date();
    document.getElementById('todayDate').textContent =
        now.toLocaleDateString('zh-TW', {
            year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
        }).replace(/星期/g, '週');

    // 3. Fetch dashboard data
    try {
        const data = await ApiClient.getDashboard();

        // ── Stats ──
        const tasks = data.active_task_count || 0;
        const events = Array.isArray(data.calendar_events) ? data.calendar_events.length : 0;
        const completed = data.completed_count || 0;
        const reports = Array.isArray(data.recent_reports) ? data.recent_reports.length : 0;
        document.getElementById('statTasks').textContent = tasks;
        document.getElementById('statEvents').textContent = events;
        document.getElementById('statCompleted').textContent = completed;
        document.getElementById('statReports').textContent = reports;

        // ── Calendar Events ──
        const calList = document.getElementById('calendarSection');
        const calEvents = data.calendar_events || [];
        window._calEvents = calEvents; // store for modal access

        if (calEvents.length === 0) {
            calList.innerHTML =
                '<div class="empty"><div class="icon">📅</div><h3>近期無行程</h3><p>目前沒有近兩週的行事曆活動</p></div>';
        } else {
            let html = '<div class="cal-list">';
            calEvents.forEach((ev, idx) => {
                const dotColor = ev.color || 'var(--blue)';
                const timeStr = formatCalTime(ev.start, ev.end);
                html +=
                    '<div class="cal-item" onclick="showEventDetail(' + idx + ')">' +
                        '<span class="cal-dot" style="background:' + dotColor + '"></span>' +
                        '<div class="cal-body">' +
                            '<div class="cal-title">' + escapeHtml(ev.summary || '') + '</div>' +
                            '<div class="cal-time">' + timeStr + '</div>' +
                        '</div>' +
                        '<span class="cal-arrow">›</span>' +
                    '</div>';
            });
            html += '</div>';
            calList.innerHTML = html;
        }

        // ── Upcoming Tasks ──
        const taskSection = document.getElementById('taskSection');
        const upTasks = data.upcoming_tasks || [];
        if (upTasks.length === 0) {
            taskSection.innerHTML =
                '<div class="empty"><div class="icon">📝</div><h3>暫無待辦任務</h3><p>目前沒有待處理的任務</p></div>';
        } else {
            let html = '<div class="minilist">';
            upTasks.slice(0, 8).forEach(t => {
                html +=
                    '<a href="tasks.html?id=' + t.id + '" class="mini-item">' +
                        '<span class="mini-icon">📌</span>' +
                        '<div class="mini-body">' +
                            '<div class="ttl">' + escapeHtml(t.title) + '</div>' +
                            '<div class="sub">' +
                                (t.due_date ? '截止：' + formatShortDate(t.due_date) : '') +
                                (t.priority ? ' · ' : '') +
                            '</div>' +
                        '</div>' +
                        (t.priority ? '<span class="mini-badge ' + priorityClass(t.priority) + '">' + priorityLabel(t.priority) + '</span>' : '') +
                    '</a>';
            });
            html += '</div>';
            taskSection.innerHTML = html;
        }

        // ── Recent Reports ──
        const reportSection = document.getElementById('reportSection');
        const repReports = data.recent_reports || [];
        if (repReports.length === 0) {
            reportSection.innerHTML =
                '<div class="empty"><div class="icon">📊</div><h3>暫無報告</h3><p>還沒有提交過任何報告</p></div>';
        } else {
            let html = '<div class="minilist">';
            repReports.slice(0, 6).forEach(r => {
                const typeLabel = r.report_type === 'daily'   ? '日報' :
                                  r.report_type === 'weekly'  ? '週報' :
                                  r.report_type === 'monthly' ? '月報' : (r.report_type || '報告');
                html +=
                    '<a href="reports.html?id=' + r.id + '" class="mini-item">' +
                        '<span class="mini-icon">📄</span>' +
                        '<div class="mini-body">' +
                            '<div class="ttl">' + escapeHtml(r.title || typeLabel + '報告') + '</div>' +
                            '<div class="sub">' +
                                (r.created_at ? formatShortDate(r.created_at) : '') +
                                (r.report_type ? ' · ' + typeLabel : '') +
                            '</div>' +
                        '</div>' +
                        '<span class="mini-badge">' + typeLabel + '</span>' +
                    '</a>';
            });
            html += '</div>';
            reportSection.innerHTML = html;
        }

    } catch (err) {
        showToast('❌ 載入儀表板資料失敗：' + err.message, 'error');
        // Show error states in all sections
        document.getElementById('calendarSection').innerHTML =
            '<div class="empty"><div class="icon">⚠️</div><h3>載入失敗</h3><p>' + escapeHtml(err.message) + '</p></div>';
        document.getElementById('taskSection').innerHTML =
            '<div class="empty"><div class="icon">⚠️</div><h3>載入失敗</h3></div>';
        document.getElementById('reportSection').innerHTML =
            '<div class="empty"><div class="icon">⚠️</div><h3>載入失敗</h3></div>';
    }
}

/* ─── Escape HTML ─── */
function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

/* ─── Init ─── */
loadDashboard();
</script>

<!-- ═══ Event Detail Modal ═══ -->
<div class="modal" id="eventDetailModal">
    <div class="modal-overlay" onclick="closeEventModal()"></div>
    <div class="modal-content modal-lg">
        <div class="modal-hdr">
            <h2 id="modalEventTitle">行程標題</h2>
            <button class="modal-close" onclick="closeEventModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="ev-detail-grid">
                <div class="ev-detail-row" id="modalEventTime">
                    <span class="ev-label">⏰ 時間</span>
                    <span class="ev-value">—</span>
                </div>
                <div class="ev-detail-row" id="modalEventLocation">
                    <span class="ev-label">📍 地點</span>
                    <span class="ev-value">—</span>
                </div>
                <div class="ev-detail-full" id="modalEventDesc">
                    <div class="ev-label">📝 說明</div>
                    <div class="ev-value ev-desc-text">—</div>
                </div>
                <div class="ev-detail-full">
                    <a id="modalEventLink" href="#" target="_blank" class="btn btn-primary btn-full" rel="noopener">
                        🔗 在 Google Calendar 中開啟
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
