<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索景點 — 旅伴小幫手</title>
    <link rel="stylesheet" href="style.css">
    <script src="spots-data.js"></script>
    <style>
        .spot-img .action-bar {
            position: absolute;
            top: 12px;
            right: 12px;
            left: 12px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .spot-img .action-bar > * { pointer-events: auto; }
        .spot-img .added-badge {
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(52,211,153,0.85);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
        }
        .spot-img .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(15,23,42,0.85);
            border: 1px solid rgba(255,255,255,0.1);
            color: #e2e8f0;
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .spot-img .nav-btn:hover { background: rgba(96,165,250,0.2); border-color: #60a5fa; }
        .spot-img .add-spot-btn {
            width: 36px; height: 36px;
            border-radius: 50%; border: none;
            background: rgba(96,165,250,0.85); color: #fff;
            font-size: 18px; cursor: pointer;
            transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .spot-img .add-spot-btn:hover { transform: scale(1.15); background: #60a5fa; }
        .spot-card.added { border-color: rgba(52,211,153,0.3); }
        .spot-card .coords-hint { display: none; }
        .search-bar {
            max-width: 560px; margin: 0 auto 20px;
            display: flex; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; overflow: hidden;
        }
        .search-bar input {
            flex: 1; padding: 14px 24px; background: transparent; border: none;
            color: #e2e8f0; font-size: 15px; outline: none;
        }
        .search-bar input::placeholder { color: #64748b; }
        .search-bar button {
            padding: 14px 28px; background: linear-gradient(135deg,#60a5fa,#7c3aed);
            border: none; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .trip-selector {
            max-width: 1100px; margin: 0 auto 16px; padding: 0 20px;
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .trip-selector label { color: #94a3b8; font-size: 14px; }
        .trip-selector select {
            padding: 8px 16px; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            color: #e2e8f0; font-size: 14px; outline: none; min-width: 200px;
        }
        .trip-selector select:focus { border-color: #60a5fa; }
        .trip-selector select option { background: #1e293b; color: #e2e8f0; }
        .trip-selector .no-trips-hint { color: #64748b; font-size: 13px; }
        .result-count { color: #64748b; font-size: 13px; text-align: center; margin-bottom: 8px; }

        .spot-footer {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 12px; flex-wrap: wrap; gap: 8px;
        }
        .spot-footer .nav-link {
            display: inline-flex; align-items: center; gap: 4px;
            color: #60a5fa; font-size: 12px; text-decoration: none;
            padding: 4px 10px; border-radius: 16px;
            border: 1px solid rgba(96,165,250,0.2);
            transition: all 0.2s;
        }
        .spot-footer .nav-link:hover { background: rgba(96,165,250,0.1); }
    </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="navbar">
    <div class="logo" onclick="location.href='index.html'">✈️ 旅伴小幫手</div>
    <nav>
        <a href="index.html">首頁</a>
        <a href="explore.html" class="active">探索景點</a>
        <a href="itinerary.html">行程規劃</a>
        <a href="info.html">實用資訊</a>
    </nav>
</div>

<section class="page-hero" style="padding-bottom:20px;">
    <h1>🗺️ 探索景點</h1>
    <p>全台 + 國際熱門景點，一鍵加入行程並開啟 Google Maps 導航</p>
    <p style="color:#64748b;font-size:13px;margin-top:4px;">共 <span id="spotTotal">0</span> 個景點 · 涵蓋 <span id="cityCount">0</span> 個城市 · 資料每週更新</p>
</section>

<div class="trip-selector" id="tripSelector">
    <label>📋 加入至行程：</label>
    <select id="tripSelect" onchange="storeSelectedTrip()">
        <option value="">— 請先選擇一個旅程 —</option>
    </select>
    <span class="no-trips-hint" id="noTripsHint" style="display:none;">還沒有旅程？去 <a href="index.html" style="color:#60a5fa;">建立一個</a></span>
</div>

<div class="search-bar">
    <input id="searchInput" type="text" placeholder="搜尋景點名稱、城市或關鍵字…" onkeyup="filterSpots()">
    <button onclick="filterSpots()">🔍</button>
</div>

<div class="filter-bar" id="filterBar">
    <!-- Categories rendered by JS -->
</div>

<div class="result-count" id="resultCount">顯示全部</div>

<div class="spot-grid" id="spotGrid">
    <!-- Rendered by JS -->
</div>

<footer>
    ✈️ 旅伴小幫手 — 探索無限可能 · <span style="color:#64748b;">景點資料每週更新</span>
</footer>

<div class="toast-container" id="toastContainer"></div>

<script>
const STORAGE_KEY = 'travel_companion_trips';
const SELECTED_TRIP_KEY = 'travel_selected_trip';
let currentFilter = '全部';
let searchQuery = '';

// Derive categories from SPOTS data
const CATEGORIES = ['全部', ...new Set(SPOTS.map(s => s.cat))];
const CAT_ICONS = { '歷史文化':'🏛️', '美食':'🍜', '自然':'🌿', '購物':'🛍️', '娛樂':'🎢' };

function init() {
    // Update stats
    document.getElementById('spotTotal').textContent = SPOTS.length;
    document.getElementById('cityCount').textContent = new Set(SPOTS.map(s => s.city)).size;
    
    // Build filter buttons
    const filterBar = document.getElementById('filterBar');
    filterBar.innerHTML = CATEGORIES.map(c => 
        `<button class="filter-btn ${c === '全部' ? 'active' : ''}" onclick="setFilter('${c}', this)">${c === '全部' ? c : (CAT_ICONS[c] || '🏷️') + ' ' + c}</button>`
    ).join('');
    
    loadTripSelector();
    
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) {
        document.getElementById('searchInput').value = q;
        searchQuery = q;
    }
    renderSpots();
}

function getTrips() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveTrips(t) { localStorage.setItem(STORAGE_KEY, JSON.stringify(t)); }

function loadTripSelector() {
    const select = document.getElementById('tripSelect');
    const hint = document.getElementById('noTripsHint');
    const trips = getTrips();
    const entries = Object.entries(trips);
    select.innerHTML = '<option value="">— 請先選擇一個旅程 —</option>';
    if (entries.length === 0) { hint.style.display = 'inline'; return; }
    hint.style.display = 'none';
    entries.forEach(([id, trip]) => {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = `✈️ ${trip.name || '未命名'}`;
        select.appendChild(opt);
    });
    const saved = localStorage.getItem(SELECTED_TRIP_KEY);
    if (saved && trips[saved]) select.value = saved;
}

function storeSelectedTrip() {
    const id = document.getElementById('tripSelect').value;
    if (id) localStorage.setItem(SELECTED_TRIP_KEY, id);
}
function getSelectedTripId() { return document.getElementById('tripSelect').value; }

function setFilter(cat, btn) {
    document.querySelector('.filter-btn.active').classList.remove('active');
    btn.classList.add('active');
    currentFilter = cat;
    renderSpots();
}

function filterSpots() {
    searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
    renderSpots();
}

function renderSpots() {
    const grid = document.getElementById('spotGrid');
    const tripId = getSelectedTripId();
    const trips = getTrips();
    const trip = trips[tripId];

    const addedSpots = new Set();
    if (trip && trip.days) {
        trip.days.forEach(day => (day.activities || []).forEach(act => { if (act.title) addedSpots.add(act.title); }));
    }

    let filtered = SPOTS.filter(s => {
        if (currentFilter !== '全部' && s.cat !== currentFilter) return false;
        if (searchQuery) {
            const q = searchQuery;
            return s.name.toLowerCase().includes(q) || s.city.toLowerCase().includes(q) || 
                   s.loc.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q);
        }
        return true;
    });

    document.getElementById('resultCount').textContent = `顯示 ${filtered.length} 個景點${searchQuery ? `（搜尋：${searchQuery}）` : ''}`;

    if (filtered.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#64748b;">
            <p style="font-size:48px;margin-bottom:16px;">🔍</p>
            <p style="font-size:18px;">沒有符合條件的景點</p>
            <p style="font-size:14px;margin-top:8px;">試試其他關鍵字或分類</p></div>`;
        return;
    }

    let html = '';
    filtered.forEach(s => {
        const isAdded = addedSpots.has(s.name);
        const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=transit`;
        const mapsSearch = `https://www.google.com/maps/search/${encodeURIComponent(s.name + ' ' + s.city)}/`;

        html += `
        <div class="spot-card ${isAdded ? 'added' : ''}">
            <div class="spot-img" style="background:linear-gradient(135deg, ${s.color});">
                ${s.icon}
                <div class="action-bar">
                    <div>
                        ${isAdded ? '<span class="added-badge">✅ 已加入</span>' : ''}
                    </div>
                    <div>
                        <a class="nav-btn" href="${mapsSearch}" target="_blank" rel="noopener" title="在 Google Maps 查看">🗺️</a>
                        ${tripId && !isAdded ? `<button class="add-spot-btn" onclick="addToTrip('${s.name.replace(/'/g,"\\'")}', '${s.loc.replace(/'/g,"\\'")}', '${s.desc.replace(/'/g,"\\'")}')" title="加入行程">+</button>` : ''}
                    </div>
                </div>
            </div>
            <div class="spot-body">
                <h3>${s.name}</h3>
                <span class="spot-loc">📍 ${s.loc}</span>
                <p>${s.desc}</p>
                <div class="spot-meta">
                    <span>⭐ ${s.rating}</span>
                    <span>🕐 ${s.time}</span>
                    <span>💰 ${s.cost}</span>
                </div>
                <div class="spot-footer">
                    <span class="tag" style="padding:4px 12px;border-radius:20px;font-size:12px;background:rgba(96,165,250,0.15);color:#60a5fa;">🏷️ ${s.cat}</span>
                    <a class="nav-link" href="${mapsUrl}" target="_blank" rel="noopener">
                        🚗 Google 導航
                    </a>
                </div>
            </div>
        </div>`;
    });
    grid.innerHTML = html;
}

function addToTrip(name, loc, desc) {
    const tripId = getSelectedTripId();
    if (!tripId) { showToast('⚠️ 請先在上方選擇一個旅程', 'error'); return; }
    const trips = getTrips();
    const trip = trips[tripId];
    if (!trip) return;
    if (!trip.days || trip.days.length === 0) trip.days = [{ date: trip.startDate || '', activities: [] }];
    
    const alreadyAdded = trip.days.some(d => (d.activities || []).some(a => a.title === name));
    if (alreadyAdded) { showToast(`⚠️ 「${name}」已在行程中`, 'error'); return; }
    
    let targetDay = trip.days.length - 1;
    for (let i = trip.days.length - 1; i >= 0; i--) {
        if (trip.days[i].activities && trip.days[i].activities.length > 0) { targetDay = i; break; }
    }
    if (!trip.days[targetDay].activities) trip.days[targetDay].activities = [];
    
    // Find coordinates for this spot
    const spot = SPOTS.find(s => s.name === name);
    const coords = spot ? `${spot.lat},${spot.lng}` : '';
    
    trip.days[targetDay].activities.push({
        id: 'act_' + Date.now(), time: '09:00', title: name,
        description: `${desc}（${loc}）`,
        lat: spot ? spot.lat : null,
        lng: spot ? spot.lng : null
    });
    trip.updatedAt = new Date().toISOString();
    saveTrips(trips);
    renderSpots();
    showToast(`✅ 「${name}」已加入行程！`, 'success');
}

function showToast(msg, type) {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast' + (type === 'success' ? ' toast-success' : type === 'error' ? ' toast-error' : '');
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

init();
</script>
</body>
</html>
